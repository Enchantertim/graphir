services:
  graphir-neo4j:
    image: neo4j:5-community
    container_name: graphir-neo4j
    ports:
      - "7474:7474"   # Browser UI
      - "7687:7687"   # Bolt protocol
    environment:
      NEO4J_AUTH: neo4j/graphir-hackathon
      NEO4J_PLUGINS: '["apoc"]'
      NEO4J_dbms_memory_heap_initial__size: 512m
      NEO4J_dbms_memory_heap_max__size: 1g
    volumes:
      - graphir-neo4j-data:/data
      - graphir-neo4j-logs:/logs
    healthcheck:
      test: ["CMD", "cypher-shell", "-u", "neo4j", "-p", "graphir-hackathon", "RETURN 1"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  graphir-neo4j-data:
  graphir-neo4j-logs:
